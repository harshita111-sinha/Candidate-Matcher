<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Candidate Matcher</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>🤖 Candidate Matcher</h1>
            <p>Smarter Hiring. Better Matches.</p>
        </div>

        <div class="card">

            <h2>📄 Job Description</h2>

            <textarea
                id="job-description"
                placeholder="Paste the complete Job Description here..."></textarea>

            <button id="analyze-btn">
                🚀 Find Best Candidates
            </button>

            <button id="download-btn" style="display:none;">
    📥      Download Ranked Excel
            </button>

        </div>

        <div id="results">

        </div>

    </div>

    <div id="profile-modal" class="modal">

        <div class="modal-content">

            <span id="close-modal">&times;</span>

            <div id="profile-content">
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
